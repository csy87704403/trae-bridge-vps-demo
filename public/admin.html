<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRAE Bridge Admin</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #f6f7f9;
        color: #17181c;
      }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 20px;
      }
      section {
        background: #fff;
        border: 1px solid #d9dde5;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      input, textarea, button {
        font: inherit;
      }
      input, textarea {
        border: 1px solid #c9ced8;
        border-radius: 6px;
        padding: 9px 10px;
        background: #fff;
        color: inherit;
      }
      input {
        min-width: 220px;
      }
      textarea {
        width: 100%;
        min-height: 92px;
        box-sizing: border-box;
        resize: vertical;
      }
      button {
        border: 1px solid #1f6feb;
        background: #1f6feb;
        color: #fff;
        border-radius: 6px;
        padding: 9px 12px;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #1f6feb;
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #101418;
        color: #dce4ee;
        border-radius: 6px;
        padding: 12px;
        min-height: 120px;
      }
      .muted {
        color: #687082;
        font-size: 13px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #111318; color: #eceff4; }
        section { background: #181b22; border-color: #303642; }
        input, textarea, button.secondary { background: #111318; color: #eceff4; border-color: #475064; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TRAE Bridge Admin</h1>
      <section>
        <div class="row">
          <input id="password" type="password" placeholder="ADMIN_PASSWORD" autocomplete="current-password" />
          <button id="savePassword">保存</button>
          <button class="secondary" id="refresh">刷新状态</button>
        </div>
        <p class="muted">登录模式会启动有界面 Chrome；服务模式使用同一个 profile 按需启动 headless Chrome。</p>
      </section>
      <section>
        <div class="row">
          <button id="startLogin">启动登录模式</button>
          <button id="startService">启动服务模式</button>
          <button class="secondary" id="stopBrowser">关闭浏览器</button>
        </div>
        <p id="remoteLink" class="muted"></p>
      </section>
      <section>
        <textarea id="prompt">回复 ok，并说明当前是否可以对话。</textarea>
        <div class="row" style="margin-top: 8px;">
          <button id="testChat">测试对话</button>
        </div>
      </section>
      <section>
        <pre id="output">loading...</pre>
      </section>
    </main>
    <script>
      const output = document.querySelector("#output");
      const password = document.querySelector("#password");
      password.value = localStorage.getItem("adminPassword") || "";

      document.querySelector("#savePassword").onclick = () => {
        localStorage.setItem("adminPassword", password.value);
        write("saved");
      };
      document.querySelector("#refresh").onclick = status;
      document.querySelector("#startLogin").onclick = () => post("/admin/api/browser/start-login");
      document.querySelector("#startService").onclick = () => post("/admin/api/browser/start-service");
      document.querySelector("#stopBrowser").onclick = () => post("/admin/api/browser/stop");
      document.querySelector("#testChat").onclick = () => post("/admin/api/test-chat", {
        prompt: document.querySelector("#prompt").value
      });

      async function status() {
        const res = await fetch("/admin/api/status", { headers: authHeaders() });
        show(await res.json());
      }

      async function post(url, body = {}) {
        write("running...");
        const res = await fetch(url, {
          method: "POST",
          headers: { "content-type": "application/json", ...authHeaders() },
          body: JSON.stringify(body)
        });
        show(await res.json());
      }

      function authHeaders() {
        return { "x-admin-password": password.value };
      }

      function write(value) {
        output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      function show(value) {
        const remote = document.querySelector("#remoteLink");
        if (value && value.remoteDisplay && value.remoteDisplay.running) {
          const url = `${location.protocol}//${location.hostname}:${value.remoteDisplay.noVncPort}/vnc.html?host=${location.hostname}&port=${value.remoteDisplay.noVncPort}&autoconnect=1&resize=scale`;
          remote.innerHTML = `远程登录窗口：<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`;
        } else {
          remote.textContent = "";
        }
        write(value);
      }

      status().catch((error) => write(String(error)));
    </script>
  </body>
</html>
